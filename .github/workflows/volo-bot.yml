name: Volo Sports Bot

on:
  schedule:
    # Run at 12:01 AM UTC daily (adjust timezone offset as needed)
    # For PST (UTC-8): 12:01 AM PST = 8:01 AM UTC
    # For EST (UTC-5): 12:01 AM EST = 5:01 AM UTC
    - cron: '1 8 * * *'  # 12:01 AM PST / 8:01 AM UTC
  workflow_dispatch:  # Allows manual triggering

jobs:
  signup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install Python dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Install Playwright browsers
      run: |
        playwright install chromium
        playwright install-deps chromium
    
    - name: Run Volo Bot
      env:
        VOLO_EMAIL: ${{ secrets.VOLO_EMAIL }}
        VOLO_PASSWORD: ${{ secrets.VOLO_PASSWORD }}
        VOLO_URL: ${{ secrets.VOLO_URL }}
        VOLO_VOLLEYBALL_URL: ${{ secrets.VOLO_VOLLEYBALL_URL }}
      run: |
        python3 volo_bot_github.py
    
    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: bot-logs
        path: |
          volo_bot.log
          *.png
        retention-days: 7
