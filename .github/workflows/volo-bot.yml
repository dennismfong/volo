name: Volo Sports Bot

on:
  schedule:
    # Run at 12:01 AM UTC daily (adjust timezone offset as needed)
    # For PST (UTC-8): 12:01 AM PST = 8:01 AM UTC
    # For EST (UTC-5): 12:01 AM EST = 5:01 AM UTC
    # Set ENABLE_SCHEDULE secret to "false" to disable scheduled runs
    - cron: '1 8 * * *'  # 12:01 AM PST / 8:01 AM UTC
  workflow_dispatch:  # Allows manual triggering for testing

jobs:
  signup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    - name: Check run mode
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          echo "🚀 Running immediately (manual trigger for testing)"
        elif [ "${{ secrets.ENABLE_SCHEDULE }}" == "false" ]; then
          echo "⏸️  Scheduled runs are disabled (ENABLE_SCHEDULE=false)"
          exit 1
        else
          echo "⏰ Running on schedule (12:01 AM)"
        fi
    
    - name: Checkout code
      if: success()
      uses: actions/checkout@v4
    
    - name: Set up Python
      if: success()
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install Python dependencies
      if: success()
      run: |
        pip install -r requirements.txt
    
    - name: Install Playwright browsers
      if: success()
      run: |
        # Install system dependencies manually (fix for Ubuntu 24.04)
        sudo apt-get update
        sudo apt-get install -y \
          libasound2t64 \
          libatk-bridge2.0-0 \
          libatk1.0-0 \
          libatspi2.0-0 \
          libcups2 \
          libdbus-1-3 \
          libdrm2 \
          libgbm1 \
          libgtk-3-0 \
          libnspr4 \
          libnss3 \
          libxcomposite1 \
          libxdamage1 \
          libxfixes3 \
          libxkbcommon0 \
          libxrandr2 \
          xvfb || true
        playwright install chromium
    
    - name: Run Volo Bot
      if: success()
      env:
        VOLO_EMAIL: ${{ secrets.VOLO_EMAIL }}
        VOLO_PASSWORD: ${{ secrets.VOLO_PASSWORD }}
        VOLO_URL: ${{ secrets.VOLO_URL }}
        VOLO_VOLLEYBALL_URL: ${{ secrets.VOLO_VOLLEYBALL_URL }}
      run: |
        python3 volo_bot_github.py
    
    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      continue-on-error: true
      with:
        name: bot-logs
        path: |
          volo_bot.log
          signup_error.png
        if-no-files-found: ignore
        retention-days: 7
